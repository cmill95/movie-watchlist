# Local Postgres for running the *app* against (not the tests — those use a
# throwaway testcontainers instance). Data persists in the named volume across
# restarts. Credentials here match the DATABASE_URL example in .env.example.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: movies
      POSTGRES_PASSWORD: movies
      POSTGRES_DB: movies
    # Host port 5433 (not 5432) to avoid clashing with a system Postgres install
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movies -d movies"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
