name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version}}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run ty type check
        run: uv run ty check

      - name: Run pytest
        run: uv run pytest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.xml
          fail_ci_if_error: true

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --all-extras --dev
      - run: uv run pre-commit run --all-files




  ci-passed:
    needs: [pre-commit, lint-and-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check pre-commit and matrix results
        run: |
          if [[ "${{ needs.pre-commit.result }}" != "success" ]] || \
             [[ "${{ needs.lint-and-test.result }}" != "success" ]]; then
            echo "One or more upstream jobs did not succeed"
            exit 1
          fi
          echo "All jobs passed"

  build-image:
    needs: ci-passed
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: |
            movie-watchlist:ci
            ghcr.io/cmill95/movie-watchlist:latest
            ghcr.io/cmill95/movie-watchlist:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image for the e2e job
        run: docker save movie-watchlist:ci -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image
          path: /tmp/image.tar
          retention-days: 1

      - name: Scan image with Trivy
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/cmill95/movie-watchlist:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/cmill95/movie-watchlist:latest
          docker push ghcr.io/cmill95/movie-watchlist:${{ github.sha }}


  e2e:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Start container
        run: docker run -d -p 8000:8000 --name mw movie-watchlist:ci

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "Container healthy"
              exit 0
            fi
            sleep 0.5
          done
          echo "Container did not become healthy in time"
          docker logs mw
          exit 1

      - name: Run e2e tests
        run: uv run pytest tests/e2e -m e2e --no-cov

      - name: Tear down container
        if: always()
        run: docker rm -f mw || true
