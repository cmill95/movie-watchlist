<tr id="movie-{{ movie.id }}">
    <td><input type="text" name="title" value="{{ movie.title }}" required maxlength="200"></td>
    <td><input type="number" name="year" value="{{ movie.year or '' }}" min="1888" max="2100"></td>
    <td>
      <select name="status">
        <option value="to_watch" {% if movie.status == "to_watch" %}selected{% endif %}>To watch</option>
        <option value="watched" {% if movie.status == "watched" %}selected{% endif %}>Watched</option>
      </select>
    </td>
    <td><input type="number" name="rating" value="{{ movie.rating or '' }}" min="1" max="10"></td>
    <td><input type="text" name="notes" value="{{ movie.notes or '' }}" maxlength="2000"></td>
    <td>
      <button hx-patch="/ui/movies/{{ movie.id }}"
        hx-include="closest tr"
        hx-target="#movie-{{ movie.id }}"
        hx-swap="outerHTML">Save</button>
      <button type="button"
              hx-get="/ui/movies/{{ movie.id }}"
              hx-target="#movie-{{ movie.id }}"
              hx-swap="outerHTML">Cancel</button>
    </td>
</tr>
