{% extends "base.html" %}

{% block content %}
<header>
  <h1>Movie Watchlist</h1>
  <label for="user-switcher">Viewing as</label>
  <select id="user-switcher" name="user_id"
          hx-post="/ui/switch-user" hx-trigger="change">
    {% for user in users %}
      <option value="{{ user.id }}" {% if user.id == current_user_id %}selected{% endif %}>{{ user.name }}</option>
    {% endfor %}
  </select>
  <form id="add-user-form" hx-post="/ui/users" hx-trigger="submit">
    <label for="new-user-name">Add user</label>
    <input id="new-user-name" name="name" type="text" maxlength="100" required>
    <button type="submit">Add</button>
  </form>
</header>

<section aria-labelledby="add-heading">
  <h2 id="add-heading">Add a movie</h2>
  {% include "_movie_form.html" %}
</section>

<section aria-labelledby="list-heading">
  <h2 id="list-heading">Your movies</h2>
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Year</th>
        <th>Status</th>
        <th>Rating</th>
        <th>Notes</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="movie-table-body">
      {% for movie in movies %}
        {% include "_movie_row.html" %}
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
